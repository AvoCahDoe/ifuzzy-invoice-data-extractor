services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - HOST=0.0.0.0
      - RAPIDOCR_SERVICE_URL=http://rapidocr_service:8005
      - LLAMA_CPP_HOST=http://llamacpp:8080/v1
      - MONGODB_URI=mongodb://mongodb:27017
    depends_on:
      - rapidocr_service
      - llamacpp
      - mongodb
    volumes:
      - ./processed_output:/app/processed_output
    networks:
      - invoice-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - API_BASE_URL=http://backend:8001
      - PORT=4000
    depends_on:
      - backend
    ports:
      - "80:4000"
    networks:
      - invoice-net

  # Marker and MinerU services have been removed; RapidOCR is the only extraction engine.

  rapidocr_service:
    build:
      context: ./rapidocr_service
      dockerfile: Dockerfile
    environment:
      - PORT=8005
    ports:
      - "8005:8005"
    volumes:
      - rapidocr_cache:/root/.cache
    networks:
      - invoice-net

  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    ports:
      - "8003:8080"
      - "8031:8081"
      - "8032:8082"
      - "8033:8083"
      - "8034:8084"
    volumes:
      - ./models:/models
    # Uses start_llama.sh to run llama-server with CPU optimization
    entrypoint: ["/bin/sh", "/models/start_llama.sh"]
    networks:
      - invoice-net

  mongodb:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27018:27017" # mapped to 27018 on host to avoid conflict with default
    volumes:
      - mongo_data:/data/db
    networks:
      - invoice-net

networks:
  invoice-net:

volumes:
  mongo_data:
  rapidocr_cache:
